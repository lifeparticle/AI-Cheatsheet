name: Update Timeline Data

on:
  workflow_dispatch:
  # schedule:
  # Runs at 00:00 on the first day of each month.
  # - cron: "0 0 1 * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update_timeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "timeline-agent/requirements.txt" anthropic

      - name: Generate timeline JSON
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python "timeline-agent/main.py"

      - name: Commit, push branch, and open PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          BRANCH="update-timeline-data-$(date +'%Y-%m-%d')"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add "timeline-data/data.json" "timeline/public/data.json"
          git commit -m "Update timeline data"

          # If the branch already exists on origin (re-run, manual push, etc.),
          # integrate remote commits so the push remains fast-forward.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git pull --rebase origin "$BRANCH"
          fi

          git push -u origin "$BRANCH"

          # Creating PRs from GITHUB_TOKEN can be blocked by repo/org settings
          # ("GitHub Actions is not permitted to create or approve pull requests").
          # We still push the branch and provide a URL to open the PR manually.
          if gh pr view "$BRANCH" --json url -q .url >/dev/null 2>&1; then
            echo "Pull request already exists."
            gh pr view "$BRANCH" --json url -q .url
          elif gh pr create \
              --title "Update timeline data $(date +'%Y-%m-%d')" \
              --body "Automated monthly timeline data update generated by the timeline agent." \
              --base main \
              --head "$BRANCH"; then
            echo "Pull request created."
          else
            echo "Pull request creation was blocked by GitHub settings."
            echo "Open it manually:"
            echo "https://github.com/${{ github.repository }}/pull/new/$BRANCH"
          fi
